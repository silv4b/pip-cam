name: Build and Release PiPCam

on:
    push:
        tags:
            - "v*" # Dispara ao criar tags como v1.2.1
    workflow_dispatch:

jobs:
    release:
        runs-on: windows-latest
        permissions:
            contents: write

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Install uv
              uses: astral-sh/setup-uv@v3
              with:
                  enable-cache: true

            - name: Set up Python
              run: uv python install 3.12

            - name: Install dependencies
              run: |
                  uv sync
                  uv add pyinstaller

            - name: Build Executable
              run: |
                  uv run pyinstaller --noconfirm --onefile --windowed `
                  --icon "assets/pipcam_icon.ico" `
                  --name "pipcamwin" `
                  --add-data "classes;classes/" `
                  --add-data "utils;utils/" `
                  --add-data "assets;assets/" `
                  main.py

            - name: Compile .ISS to .EXE
              uses: Minionguyjpro/Inno-Setup-Action@v1.2.2
              with:
                  path: "inno-setup-action.iss"

            - name: Create Release and Upload Asset
              uses: softprops/action-gh-release@v2
              with:
                  # O Inno Setup por padrão coloca o resultado na pasta Output
                  files: Output/*.exe
                  tag_name: ${{ github.ref_name }}
                  name: Release ${{ github.ref_name }}
                  draft: false
                  prerelease: false
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}