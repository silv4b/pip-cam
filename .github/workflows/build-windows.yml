name: Build PiPCamPro

on:
    push:
        branches: [ "main" ]
    workflow_dispatch:
        # Permite rodar manualmente pelo site do GitHub

jobs:
    build:
        runs-on: windows-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Install uv
              uses: astral-sh/setup-uv@v3
              with:
                  enable-cache: true

            - name: Set up Python
              run: uv python install 3.12

            - name: Install dependencies
              run: |
                  uv sync
                  uv add pyinstaller

            - name: Build Executable
              run: |
                  uv run pyinstaller --noconsole --onefile --name "PiPCamPro" `
                  --add-data "classes;classes" `
                  --add-data "utils;utils" `
                  main.py

            - name: Upload Executable Artifact
              uses: actions/upload-artifact@v4
              with:
                  name: PiPCamPro-Windows
                  path: dist/PiPCamPro.exe
